model = "qwen-nowak"
num_tasks = 3
num_rollouts = 1
max_concurrent = 3
max_turns = 3
max_input_tokens = 4096
max_output_tokens = 192
rich = false
push = false
output_dir = "results/live_smoke"

[taskset]
id = "donor-coord-v1"
num_tasks = 3
seed = 100
b = 4.0
c = 1.0
w = 0.7
q = 0.8
horizon_min = 3
horizon_max = 3
partner_policy = "tit_for_tat"

[taskset.task]
model = "A"

[harness]
id = "null"

[harness.runtime]
type = "subprocess"

[client]
type = "eval"
base_url = "http://127.0.0.1:8000/v1"
api_key_var = "VLLM_API_KEY"

[sampling]
temperature = 0.0
top_p = 1.0
max_tokens = 64
chat_template_kwargs = { enable_thinking = false }
